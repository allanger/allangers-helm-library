suite: Test pod generation
templates:
  - pod.yaml
tests:
  - it: Validate probes
    values:
      - ./pod-values/set-probes.yaml
    asserts:
      - equal:
          path: readinessProbe
          value:
            readinessProbe:
              exec:
                command:
                  - cat
                  - /tmp/healthy
                initialDelaySeconds: 5
                periodSeconds: 5
      - equal: 
          path: startupProbe
          value:      
            startupProbe:
              exec:
                command:
                  - cat
                  - /tmp/healthy
                initialDelaySeconds: 5
                periodSeconds: 5

      - equal: 
          path: livenessProbe
          value:
            livenessProbe:
              exec:
                command:
                  - cat
                  - /tmp/healthy
                initialDelaySeconds: 5
                periodSeconds: 5
  - it: Validate empty probes
    values:
      - ./pod-values/empty-probes.yaml
    asserts:
      - equal:
          path: readinessProbe
          value: null
      - equal: 
          path: startupProbe
          value: null
      - equal: 
          path: livenessProbe
          value: null
  - it: Validate templated probes
    values:
      - ./pod-values/tpl-probes.yaml
    set:
      tplProbes.port: 8080
    asserts:
      - equal:
          path: readinessProbe
          value:
            readinessProbe:
              tcpSocket:
                port: "8080"
                initialDelaySeconds: 15
                periodSeconds: 10
      - equal: 
          path: startupProbe
          value:      
            startupProbe:
              tcpSocket:
                port: "8080"
                initialDelaySeconds: 15
                periodSeconds: 10
      - equal: 
          path: livenessProbe
          value:
            livenessProbe:
              tcpSocket:
                port: "8080"
                initialDelaySeconds: 15
                periodSeconds: 10
